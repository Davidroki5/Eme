<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Panel</title>

<style>
body{
  margin:0;
  background:#05070d;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

/* Background glow */
body::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:red;
  filter:blur(150px);
  opacity:0.15;
}

/* Emergency Card */
.panel{
  position:relative;
  width:320px;
  height:200px;
  background:linear-gradient(145deg,#1a0000,#2a0000);
  border-radius:20px;
  border:2px solid #ff1a1a;
  box-shadow:
    0 0 20px #ff0000,
    0 0 60px rgba(255,0,0,0.6),
    inset 0 0 30px rgba(255,0,0,0.4);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  animation:pulse 2s infinite;
}

/* Glowing text */
h1{
  color:#ff4d4d;
  letter-spacing:4px;
  font-size:22px;
  text-shadow:
    0 0 10px red,
    0 0 20px red,
    0 0 40px darkred;
}

.icon{
  font-size:40px;
  color:#ff4d4d;
  margin-bottom:10px;
  text-shadow:0 0 20px red;
}

/* Pulse animation */
@keyframes pulse{
  0%{ box-shadow:0 0 20px red; }
  50%{ box-shadow:0 0 50px red; }
  100%{ box-shadow:0 0 20px red; }
}

/* Scanline effect */
.scanlines{
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03) 0px,
    rgba(255,255,255,0.03) 2px,
    transparent 2px,
    transparent 4px
  );
  pointer-events:none;
}

/* Button */
button{
  margin-top:15px;
  padding:8px 20px;
  background:#ff1a1a;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 0 10px red;
}

button:hover{
  background:#cc0000;
}
</style>
</head>

<body>

<div class="panel">
  <div class="icon">⚠</div>
  <h1>EMERGENCY</h1>
  <button onclick="activate()">ACTIVATE</button>
  <div class="scanlines"></div>
</div>

<script>
function activate(){
  alert("🚨 EMERGENCY PROTOCOL INITIATED 🚨");
}
</script>

</body>
</html>
