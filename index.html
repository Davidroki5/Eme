<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMERGENCY ALERT</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

/* Flash background */
.flash{
  position:fixed;
  inset:0;
  background:red;
  opacity:0;
  animation:flash 1s infinite;
  pointer-events:none;
}

@keyframes flash{
  0%{opacity:0;}
  50%{opacity:0.35;}
  100%{opacity:0;}
}

/* Center container */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

/* Glitch effect */
h1{
  font-size:60px;
  letter-spacing:8px;
  color:#ff1a1a;
  text-shadow:0 0 20px red, 0 0 40px red;
  animation:glitch 0.15s infinite alternate;
}

@keyframes glitch{
  from{ transform:translate(-2px, -50%); }
  to{ transform:translate(2px, -50%); }
}

#countdown{
  font-size:40px;
  margin-top:20px;
}

/* Scroll warning */
.scroll{
  position:absolute;
  bottom:0;
  width:100%;
  background:red;
  color:black;
  font-weight:bold;
  padding:10px 0;
  overflow:hidden;
  white-space:nowrap;
}

.scroll span{
  display:inline-block;
  padding-left:100%;
  animation:scroll 12s linear infinite;
}

@keyframes scroll{
  from{ transform:translateX(0); }
  to{ transform:translateX(-100%); }
}

/* Scanlines */
.scanlines{
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.04) 0px,
    rgba(255,255,255,0.04) 2px,
    transparent 2px,
    transparent 4px
  );
  pointer-events:none;
}

/* Button */
button{
  position:absolute;
  top:20px;
  right:20px;
  padding:10px 20px;
  background:red;
  border:none;
  color:white;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<button onclick="startAlert()">START</button>

<div class="flash"></div>
<div class="scanlines"></div>

<div class="center">
  <h1>EMERGENCY</h1>
  <div id="countdown">10</div>
</div>

<div class="scroll">
  <span>⚠ WARNING ⚠ EMERGENCY PROTOCOL ACTIVATED ⚠ SEEK IMMEDIATE SAFETY ⚠</span>
</div>

<script>
let time = 10;
let interval;
let audioContext;
let oscillator;
let sirenInterval;

function startAlert(){

  if(interval) return; // prevent multiple starts

  // Countdown
  interval = setInterval(()=>{
    time--;
    document.getElementById("countdown").innerText = time;

    if(time <= 0){
      clearInterval(interval);
      document.getElementById("countdown").innerText = "LOCKDOWN";
    }
  },1000);

  // Siren (looping up/down frequency)
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  oscillator = audioContext.createOscillator();
  let gainNode = audioContext.createGain();

  oscillator.type = "sawtooth";
  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);
  gainNode.gain.value = 0.2;

  oscillator.start();

  let up = true;
  sirenInterval = setInterval(()=>{
    oscillator.frequency.setValueAtTime(
      up ? 1000 : 600,
      audioContext.currentTime
    );
    up = !up;
  },600);
}
</script>

</body>
</html>
